name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run tests
        run: node test.js
        working-directory: app

  build-and-scan:
    name: Build & Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t hello-app:${{ github.sha }} .
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hello-app:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          vuln-type: 'os'
      - name: Tag image as latest
        run: docker tag hello-app:${{ github.sha }} hello-app:latest
      - name: Export image
        run: docker save hello-app:latest -o /tmp/hello-app.tar
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-app-image
          path: /tmp/hello-app.tar
          retention-days: 1

  deploy:
    name: Deploy to kind
    runs-on: ubuntu-latest
    needs: build-and-scan
    steps:
      - uses: actions/checkout@v4
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: hello-app-image
          path: /tmp
      - name: Load image into Docker
        run: docker load -i /tmp/hello-app.tar
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: demo-cluster
      - name: Load image into kind
        run: kind load docker-image hello-app:latest --name demo-cluster
      - name: Deploy RBAC
        run: kubectl apply -f k8s/rbac.yaml
      - name: Deploy NetworkPolicy
        run: kubectl apply -f k8s/networkpolicy.yaml
      - name: Deploy application
        run: kubectl apply -f k8s/deployment.yaml
      - name: Deploy service
        run: kubectl apply -f k8s/service.yaml
      - name: Wait for rollout
        run: kubectl rollout status deployment/hello-app --timeout=90s
      - name: Show running pods
        run: kubectl get pods -o wide
      - name: Smoke test
        run: |
          kubectl port-forward svc/hello-app-svc 8080:80 &
          sleep 3
          curl -sf http://localhost:8080/health | grep '"status":"ok"'
          echo "Smoke test passed!"
