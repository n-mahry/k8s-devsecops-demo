---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hello-app-sa
  namespace: default
  labels:
    app: hello-app
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hello-app-role
  namespace: default
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hello-app-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: hello-app-sa
    namespace: default
roleRef:
  kind: Role
  name: hello-app-role
  apiGroup: rbac.authorization.k8s.io
